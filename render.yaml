services:
  - type: cron
    name: milan-housing-bot
    runtime: docker
    plan: starter
    schedule: "0 * * * *"   # top of every hour
    envVars:
      # Paste the full service-account JSON as a single-line string
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NOTIFY_EMAILS
        sync: false
      # GitHub token for pushing map.html to GitHub Pages after each run
      # Create at: github.com → Settings → Developer settings → Personal access tokens
      # Scopes needed: repo (Contents: write)
      - key: GITHUB_TOKEN
        sync: false
      # Your GitHub repo in "owner/repo" format
      - key: GITHUB_REPO
        value: "anibalrosado/milan-housing-bot"
      # Set to https://anibalrosado.github.io/milan-housing-bot/map.html once Pages is live
      - key: RENDER_MAP_URL
        value: "https://anibalrosado.github.io/milan-housing-bot/map.html"
      - key: USE_GOOGLE_GEOCODING
        value: "false"
      - key: USE_DISTANCE_MATRIX_API
        value: "false"
      - key: GOOGLE_MAPS_API_KEY
        value: ""
